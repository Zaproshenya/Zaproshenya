<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM — Запрошення ✦</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --card: #ffffff;
      --border: #dee2e6;
      --text: #212529;
      --muted: #6c757d;
      --backlog: #6c757d;
      --todo: #ffc107;
      --in-progress: #0d6efd;
      --review: #6f42c1;
      --done: #198754;
      --rejected: #dc3545;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 2rem;
      font-style: italic;
      margin-bottom: 5px;
    }
    .header p { color: var(--muted); }
    
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      font-size: .9rem;
    }
    .stat-card strong { color: var(--muted); }
    .stat-card span { margin-left: 5px; }
    
    .kanban {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding-bottom: 20px;
    }
    
    .column {
      flex: 1;
      min-width: 280px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px;
    }
    
    .column-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
    }
    
    .column-header h3 {
      font-size: 1rem;
      font-weight: 600;
    }
    
    .column-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    
    .column-count {
      background: var(--muted);
      color: #fff;
      font-size: .7rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    
    .tasks {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 60px;
    }
    
    .task {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: grab;
      transition: box-shadow .2s, transform .1s;
      animation: fadeIn .3s ease;
    }
    
    .task:hover {
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
      transform: translateY(-1px);
    }
    
    .task.dragging {
      opacity: .5;
      cursor: grabbing;
    }
    
    .task-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .task-id {
      font-family: monospace;
      font-size: .7rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    
    .task-title {
      font-weight: 600;
      font-size: .95rem;
      flex: 1;
    }
    
    .priority-badge {
      font-size: .65rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .priority-critical { background: #dc3545; color: #fff; }
    .priority-high { background: #fd7e14; color: #fff; }
    .priority-medium { background: #ffc107; color: #000; }
    .priority-low { background: #198754; color: #fff; }
    
    .type-badge {
      font-size: .65rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
      margin-left: auto;
    }
    .type-bug { background: #dc354520; color: #dc3545; }
    .type-feature { background: #19875420; color: #198754; }
    .type-improvement { background: #0d6efd20; color: #0d6efd; }
    .type-task { background: #6c757d20; color: #6c757d; }
    
    .task-assignee {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    
    .task-description {
      font-size: .85rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .task-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .7rem;
      color: var(--muted);
    }
    
    .labels {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .label {
      background: #e9ecef;
      color: var(--text);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: .65rem;
    }
    
    .comments-count {
      margin-left: auto;
    }
    
    .empty-column {
      color: var(--muted);
      text-align: center;
      padding: 40px 10px;
      font-style: italic;
    }
    
    .add-task-btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: 2px dashed var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: all .2s;
    }
    .add-task-btn:hover {
      border-color: var(--todo);
      color: var(--todo);
      background: #fff3cd;
    }
    
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--card);
      border-radius: 12px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      animation: slideUp .3s ease;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 1.3rem; font-weight: 600; }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--muted);
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: .85rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text);
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .9rem;
      font-family: inherit;
    }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-row {
      display: flex;
      gap: 12px;
    }
    .form-row .form-group { flex: 1; }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-primary {
      background: var(--done);
      color: #fff;
    }
    .btn-primary:hover { background: #156847; }
    .btn-secondary {
      background: var(--muted);
      color: #fff;
    }
    .btn-secondary:hover { background: #5a6268; }
    
    .btn-group {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px) scale(.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    @media (max-width: 768px) {
      body { padding: 10px; }
      .kanban { flex-direction: column; }
      .column { min-width: 100%; }
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>CRM — Запрошення ✦</h1>
    <p>Керування задачами для платформи</p>
  </div>
  
  <div class="stats" id="stats"></div>
  
  <div class="kanban" id="kanban"></div>
  
  <!-- Task Modal -->
  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal" id="taskModal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Нове завдання</div>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <div class="form-group">
          <label class="form-label">Заголовок *</label>
          <input type="text" class="form-input" id="taskTitle" required>
        </div>
        <div class="form-group">
          <label class="form-label">Опис</label>
          <textarea class="form-textarea" id="taskDescription"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Тип</label>
            <select class="form-select" id="taskType">
              <option value="bug">🐛 Баг</option>
              <option value="feature">✨ Фіча</option>
              <option value="improvement">📈 Покращення</option>
              <option value="task">📋 Задача</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Пріоритет</label>
            <select class="form-select" id="taskPriority">
              <option value="low">🟢 Низький</option>
              <option value="medium" selected>🟡 Середній</option>
              <option value="high">🟠 Високий</option>
              <option value="critical">🔴 Критичний</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Стан</label>
            <select class="form-select" id="taskStatus">
              <option value="backlog">Backlog</option>
              <option value="todo">To Do</option>
              <option value="in-progress">In Progress</option>
              <option value="review">Review</option>
              <option value="done">Done</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Виконавець</label>
            <select class="form-select" id="taskAssignee">
              <option value="">Не призначено</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Мітки (через кому)</label>
          <input type="text" class="form-input" id="taskLabels" placeholder="friends, notifications, ui">
        </div>
        <div class="form-group">
          <label class="form-label">Пов'язані файли (через кому)</label>
          <input type="text" class="form-input" id="taskFiles" placeholder="js/db.js, css/pages.css">
        </div>
        <div class="btn-group">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Скасувати</button>
          <button type="submit" class="btn btn-primary">Зберегти</button>
        </div>
      </form>
    </div>
  </div>
  
  <script>
    // Load data
    let crmData = {};
    let currentTask = null;
    
    async function loadData() {
      try {
        const response = await fetch('data/tasks.json?t=' + Date.now());
        crmData = await response.json();
        renderKanban();
        renderStats();
        updateAssigneeOptions();
      } catch (e) {
        console.error('Error loading CRM data:', e);
        showError('Не вдалося завантажити дані CRM');
      }
    }
    
    function renderStats() {
      const stats = crmData.stats || {};
      const container = document.getElementById('stats');
      container.innerHTML = `
        <div class="stat-card"><strong>Всього:</strong> <span>${stats.total || 0}</span></div>
        <div class="stat-card"><strong>Done:</strong> <span>${stats.byStatus?.done || 0}</span></div>
        <div class="stat-card"><strong>In Progress:</strong> <span>${stats.byStatus?.['in-progress'] || 0}</span></div>
        <div class="stat-card"><strong>To Do:</strong> <span>${stats.byStatus?.todo || 0}</span></div>
        <div class="stat-card"><strong>Backlog:</strong> <span>${stats.byStatus?.backlog || 0}</span></div>
      `;
    }
    
    function renderKanban() {
      const container = document.getElementById('kanban');
      const columns = crmData.columns || {};
      
      container.innerHTML = Object.entries(columns).map(([id, col]) => {
        const tasks = crmData.tasks?.filter(t => t.column === id) || [];
        const color = col.color || '#6c757d';
        
        return `
          <div class="column" data-column="${id}" ondrop="dropTask(event, '${id}')" ondragover="allowDrop(event)">
            <div class="column-header">
              <div class="column-color" style="background:${color}"></div>
              <h3>${col.name}</h3>
              <span class="column-count">${tasks.length}</span>
            </div>
            <div class="tasks" id="column-${id}">
              ${tasks.length === 0 ? '<div class="empty-column">Немає завдань</div>' : ''}
              ${tasks.map(renderTask).join('')}
            </div>
            <button class="add-task-btn" onclick="addTask('${id}')">+ Додати завдання</button>
          </div>
        `;
      }).join('');
    }
    
    function renderTask(task) {
      const priorityClass = `priority-${task.priority || 'medium'}`;
      const typeClass = `type-${task.type || 'task'}`;
      const commentsCount = task.comments?.length || 0;
      const labels = task.labels || [];
      const created = new Date(task.createdAt).toLocaleDateString('uk-UA');
      
      return `
        <div class="task" draggable="true" data-id="${task.id}" data-column="${task.column}" 
             ondragstart="dragStart(event, '${task.id}')" ondragend="dragEnd(event)">
          <div class="task-header">
            <span class="task-id">${task.id}</span>
            <span class="task-title">${escapeHtml(task.title)}</span>
            <span class="priority-badge ${priorityClass}">${task.priority || 'medium'}</span>
            <span class="type-badge ${typeClass}">${getTypeLabel(task.type)}</span>
          </div>
          ${task.assignee ? `<div class="task-assignee">👤 ${escapeHtml(task.assignee)}</div>` : ''}
          ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
          <div class="task-meta">
            <span>📅 ${created}</span>
            ${labels.length > 0 ? `<div class="labels">${labels.map(l => `<span class="label">${escapeHtml(l)}</span>`).join('')}</div>` : ''}
            ${commentsCount > 0 ? `<span class="comments-count">💬 ${commentsCount}</span>` : ''}
          </div>
          <div style="margin-top:8px; display:flex; gap:6px;">
            <button class="btn btn-secondary" style="padding:4px 8px; font-size:.75rem;" onclick="editTask('${task.id}')">✏️</button>
            <button class="btn btn-secondary" style="padding:4px 8px; font-size:.75rem;" onclick="deleteTask('${task.id}')">🗑️</button>
          </div>
        </div>
      `;
    }
    
    function getTypeLabel(type) {
      const labels = {
        'bug': 'Баг',
        'feature': 'Фіча',
        'improvement': 'Покращення',
        'task': 'Задача'
      };
      return labels[type] || type;
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Drag and Drop
    function dragStart(e, taskId) {
      e.dataTransfer.setData('text/plain', taskId);
      e.target.classList.add('dragging');
    }
    
    function dragEnd(e) {
      e.target.classList.remove('dragging');
    }
    
    function allowDrop(e) {
      e.preventDefault();
    }
    
    async function dropTask(e, columnId) {
      e.preventDefault();
      const taskId = e.dataTransfer.getData('text/plain');
      if (!taskId) return;
      
      // Find task and update column
      const task = crmData.tasks.find(t => t.id === taskId);
      if (task) {
        task.column = columnId;
        task.status = columnId;
        task.updatedAt = new Date().toISOString();
        
        await saveData();
        renderKanban();
      }
    }
    
    // Modal functions
    function addTask(columnId) {
      currentTask = null;
      document.getElementById('modalTitle').textContent = 'Нове завдання';
      document.getElementById('taskId').value = '';
      document.getElementById('taskTitle').value = '';
      document.getElementById('taskDescription').value = '';
      document.getElementById('taskType').value = 'bug';
      document.getElementById('taskPriority').value = 'medium';
      document.getElementById('taskStatus').value = columnId;
      document.getElementById('taskAssignee').value = '';
      document.getElementById('taskLabels').value = '';
      document.getElementById('taskFiles').value = '';
      document.getElementById('modalOverlay').style.display = 'flex';
    }
    
    function editTask(taskId) {
      const task = crmData.tasks.find(t => t.id === taskId);
      if (!task) return;
      
      currentTask = task;
      document.getElementById('modalTitle').textContent = 'Редагувати завдання';
      document.getElementById('taskId').value = task.id;
      document.getElementById('taskTitle').value = task.title || '';
      document.getElementById('taskDescription').value = task.description || '';
      document.getElementById('taskType').value = task.type || 'bug';
      document.getElementById('taskPriority').value = task.priority || 'medium';
      document.getElementById('taskStatus').value = task.column || 'todo';
      document.getElementById('taskAssignee').value = task.assignee || '';
      document.getElementById('taskLabels').value = (task.labels || []).join(', ');
      document.getElementById('taskFiles').value = (task.relatedFiles || []).join(', ');
      document.getElementById('modalOverlay').style.display = 'flex';
    }
    
    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
      currentTask = null;
    }
    
    function updateAssigneeOptions() {
      const select = document.getElementById('taskAssignee');
      const users = crmData.users || [];
      select.innerHTML = '<option value="">Не призначено</option>';
      users.forEach(user => {
        const option = document.createElement('option');
        option.value = user.name || user.id;
        option.textContent = user.name || user.id;
        select.appendChild(option);
      });
    }
    
    async function saveData() {
      // Update stats
      crmData.stats = {
        total: crmData.tasks?.length || 0,
        byStatus: {},
        byPriority: {},
        byAssignee: {}
      };
      
      crmData.tasks?.forEach(task => {
        crmData.stats.byStatus[task.column || task.status] = (crmData.stats.byStatus[task.column || task.status] || 0) + 1;
        crmData.stats.byPriority[task.priority] = (crmData.stats.byPriority[task.priority] || 0) + 1;
        if (task.assignee) {
          crmData.stats.byAssignee[task.assignee] = (crmData.stats.byAssignee[task.assignee] || 0) + 1;
        }
      });
      
      crmData.lastUpdated = new Date().toISOString();
      
      try {
        // In a real app, you would POST to a server
        // For now, we'll simulate saving
        console.log('Data saved:', crmData);
        
        // For demo purposes, download the file
        const dataStr = JSON.stringify(crmData, null, 2);
        const dataBlob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(dataBlob);
        
        const link = document.createElement('a');
        link.href = url;
        link.download = 'tasks.json';
        link.click();
        URL.revokeObjectURL(url);
        
        return true;
      } catch (e) {
        console.error('Error saving:', e);
        return false;
      }
    }
    
    async function handleFormSubmit(e) {
      e.preventDefault();
      
      const taskData = {
        id: document.getElementById('taskId').value || `TASK-${String(crmData.tasks?.length || 0).padStart(3, '0')}`,
        title: document.getElementById('taskTitle').value,
        description: document.getElementById('taskDescription').value,
        type: document.getElementById('taskType').value,
        priority: document.getElementById('taskPriority').value,
        column: document.getElementById('taskStatus').value,
        status: document.getElementById('taskStatus').value,
        assignee: document.getElementById('taskAssignee').value || null,
        labels: document.getElementById('taskLabels').value?.split(',').map(l => l.trim()).filter(l => l) || [],
        relatedFiles: document.getElementById('taskFiles').value?.split(',').map(f => f.trim()).filter(f => f) || [],
        createdAt: currentTask?.createdAt || new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        comments: currentTask?.comments || []
      };
      
      if (currentTask) {
        // Update existing task
        const index = crmData.tasks.findIndex(t => t.id === currentTask.id);
        if (index !== -1) {
          crmData.tasks[index] = taskData;
        }
      } else {
        // Add new task
        if (!crmData.tasks) crmData.tasks = [];
        crmData.tasks.push(taskData);
      }
      
      await saveData();
      closeModal();
      renderKanban();
      renderStats();
    }
    
    function deleteTask(taskId) {
      if (!confirm('Видалити це завдання?')) return;
      crmData.tasks = crmData.tasks.filter(t => t.id !== taskId);
      saveData();
      renderKanban();
      renderStats();
    }
    
    function showError(msg) {
      alert(msg);
    }
    
    // Initialize
    document.getElementById('taskForm').addEventListener('submit', handleFormSubmit);
    loadData();
  </script>
</body>
</html>
